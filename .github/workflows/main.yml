name: Update Images List

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - '*.sh'
      - '.github/workflows/*.yml'

permissions:
  contents: write

concurrency:
  group: update-images-list
  cancel-in-progress: false

jobs:
  update-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Validate script
        run: bash -n auto.sh

      - name: Generate image list
        run: bash auto.sh

      - name: Show image list summary
        run: |
          echo "Total entries: $(wc -l < images.txt)"
          echo "Docker special runtime entries:"
          grep '^docker://' images.txt || true

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add images.txt
          if git diff --cached --quiet; then
            echo "No image list changes to commit"
          else
            git commit -m "chore: update images list"
            git push
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: images-list
          path: images.txt
          retention-days: 30
